<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caisse Noire — HBC du Pilat</title>
<link rel="icon" type="image/png" href="./favicon.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0480d8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HBC Pilat SG">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ============================================================
     CAISSE NOIRE — HBC DU PILAT
     Theme aux couleurs du club : bleu #0480d8, blanc, noir
     ============================================================ */
  :root{
    --bleu:#0480d8;
    --bleu-fonce:#045f9f;
    --bleu-pale:#e3f0fb;
    --noir:#14181d;
    --bg:#eef4fa;
    --paper:#ffffff;
    --paper-dim:#eef3f8;
    --billet:#2f9e6b; --billet-dark:#20724c;
    --amende:#e0512e; --attente:#dd9c07;
    --table:#0480d8; --bouffe:#c46a1f;
    --line:#d5e3f0; --txt:#1c2530; --txt-dim:#5e7080;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Archivo',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:70px}
  .wrap{max-width:520px;margin:0 auto;padding:0 16px}

  header.wrap{padding:20px 16px 12px;text-align:center}
  .head-row{position:relative;display:flex;align-items:center;gap:10px;margin-top:20px;margin-bottom:9px;padding-left:58px}
  .head-titles{text-align:left;min-width:0}
  .logo{width:54px;height:54px;object-fit:contain;display:block;flex:none;filter:drop-shadow(0 2px 6px rgba(4,95,159,.25))}
  .club{font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--bleu-fonce);font-weight:700}
  h1{font-family:'Archivo Black';font-size:clamp(20px,5.6vw,26px);line-height:1.05;margin-top:2px;color:var(--bleu)}
  h1 .noire{color:var(--noir)}
  .total-caisse{margin-top:12px;display:inline-flex;align-items:baseline;gap:8px;background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:7px 16px;box-shadow:0 2px 8px rgba(4,95,159,.08)}
  .total-caisse b{font-family:'Archivo Black';font-size:20px;color:var(--billet)}
  .total-caisse span{font-size:12px;color:var(--txt-dim)}

  .who-bar{display:flex;align-items:center;justify-content:center;gap:10px;margin:12px auto 6px;font-size:13px;color:var(--txt-dim)}
  .who-bar b{color:var(--txt)}
  .who-bar button{border:0;background:none;color:var(--bleu);font-family:'Archivo';font-size:12px;text-decoration:underline;cursor:pointer}
  .gest-badge{background:var(--bleu);color:#fff;font-family:'Archivo Black';font-size:10px;padding:3px 8px;border-radius:6px;letter-spacing:.05em}

  .main-nav{display:flex;gap:8px;margin:10px 0 18px;justify-content:center;flex-wrap:wrap}
  .main-nav button{border:1.5px solid var(--line);background:var(--paper);color:var(--txt-dim);font-family:'Archivo';font-weight:700;font-size:13.5px;padding:9px 16px;border-radius:12px;cursor:pointer;transition:.18s}
  .main-nav button.on{background:var(--bleu);border-color:var(--bleu);color:#fff}
  .main-nav button .badge{display:inline-block;background:#fff;color:var(--bleu);font-size:11px;border-radius:999px;padding:1px 7px;margin-left:5px;vertical-align:1px}
  .main-nav button:not(.on) .badge{background:var(--bleu-pale);color:var(--bleu-fonce)}

  /* ---- menu déroulant ---- */
  .menu-wrap{position:relative;width:100%;max-width:340px}
  .menu-btn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--bleu);color:#fff;border:0;border-radius:12px;
    font-family:'Archivo';font-weight:700;font-size:14.5px;padding:12px 16px;cursor:pointer;
    box-shadow:0 2px 10px rgba(4,95,159,.2)}
  .menu-btn .badge{background:#fff;color:var(--bleu);font-size:11px;border-radius:999px;padding:1px 7px}
  .menu-btn .chev{font-size:12px;opacity:.85;transition:.2s}
  .menu-list.open ~ * .chev{transform:rotate(180deg)}
  .menu-list{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:40;
    background:var(--paper);border:1.5px solid var(--line);border-radius:14px;
    box-shadow:0 10px 30px rgba(4,95,159,.18);padding:6px;display:none}
  .menu-list.open{display:block}
  .menu-item{display:flex;align-items:center;justify-content:space-between;width:100%;
    border:0;background:none;text-align:left;font-family:'Archivo';font-weight:600;
    font-size:14px;color:var(--txt);padding:11px 12px;border-radius:9px;cursor:pointer}
  .menu-item:hover{background:var(--bleu-pale)}
  .menu-item.on{background:var(--bleu);color:#fff}
  .menu-item .badge{background:var(--bleu-pale);color:var(--bleu-fonce);font-size:11px;border-radius:999px;padding:1px 7px}
  .menu-item.on .badge{background:#fff;color:var(--bleu)}

  /* ---- menu hamburger + tiroir latéral ----
     (sélecteurs .main-nav .xxx pour prendre le dessus sur .main-nav button) */
  .hamb{position:absolute;left:0;top:50%;transform:translateY(-50%);z-index:46;flex:none;width:46px;height:46px;
    border:0;border-radius:13px;background:var(--bleu);cursor:pointer;padding:0;
    display:none;flex-direction:column;justify-content:center;align-items:center;gap:4.5px;
    box-shadow:0 3px 14px rgba(4,95,159,.35)}
  .hamb.floating{position:fixed;top:12px;left:12px;transform:none}
  .hamb span{display:block;width:19px;height:2.6px;background:#fff;border-radius:2px}
  .main-nav .menu-item{display:flex;align-items:center;justify-content:space-between;width:100%;
    border:0;background:none;text-align:left;font-family:'Archivo';font-weight:600;
    font-size:14px;color:var(--txt);padding:11px 12px;border-radius:9px;cursor:pointer;box-shadow:none}
  .main-nav .menu-item:hover{background:var(--bleu-pale)}
  .main-nav .menu-item.on{background:var(--bleu);border-color:var(--bleu);color:#fff}
  .main-nav .menu-item .badge{background:var(--bleu-pale);color:var(--bleu-fonce)}
  .main-nav .menu-item.on .badge{background:#fff;color:var(--bleu)}
  .drawer-bg{position:fixed;inset:0;background:rgba(9,34,54,.5);z-index:47;display:none}
  .drawer-bg.open{display:block}
  .drawer{position:fixed;top:0;left:-300px;bottom:0;width:274px;background:var(--paper);
    z-index:48;transition:left .25s ease;box-shadow:4px 0 30px rgba(4,95,159,.25);
    padding:16px 12px;overflow-y:auto}
  .drawer.open{left:0}
  .drawer .d-brand{padding:6px 10px 14px;border-bottom:1.5px solid var(--line);margin-bottom:10px}
  .drawer .d-brand b{font-family:'Archivo Black';color:var(--bleu);font-size:17px;display:block;line-height:1.15}
  .drawer .d-brand span{font-size:11.5px;color:var(--txt-dim);font-weight:600}
  .menu-current{background:var(--paper);border:1.5px solid var(--line);border-radius:999px;
    padding:9px 20px;font-family:'Archivo';font-weight:700;font-size:14px;color:var(--bleu-fonce)}
  .menu-current .badge{background:var(--bleu);color:#fff;font-size:11px;border-radius:999px;padding:1px 7px;margin-left:5px}

  .section-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--bleu-fonce);font-weight:700;margin:18px 2px 10px;display:flex;align-items:center;gap:10px}
  .section-label .add-mini{margin-left:auto;border:1.5px solid var(--billet);background:transparent;color:var(--billet);font-family:'Archivo';font-weight:700;font-size:12px;padding:5px 12px;border-radius:999px;cursor:pointer;letter-spacing:0;text-transform:none}
  .section-label .add-mini:hover{background:var(--billet);color:#fff}

  .team-filter{display:flex;gap:7px;margin:0 0 14px}
  .team-filter button{border:1.5px solid var(--line);background:var(--paper);color:var(--txt-dim);font-family:'Archivo';font-weight:700;font-size:12.5px;padding:7px 14px;border-radius:999px;cursor:pointer}
  .team-filter button.on{background:var(--noir);border-color:var(--noir);color:#fff}
  .team-tag{font-family:'Archivo Black';font-size:10px;letter-spacing:.06em;padding:3px 8px;border-radius:6px;color:#fff;display:inline-block}

  .ticket{position:relative;background:var(--paper);color:var(--txt);border-radius:var(--radius);padding:16px 16px 14px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 10px rgba(4,95,159,.09)}
  .ticket::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:radial-gradient(circle at 6px -2px, var(--bg) 5px, transparent 5.5px) repeat-x;background-size:14px 8px}
  .t-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-top:4px}
  .t-motif{font-weight:700;font-size:15.5px}
  .t-meta{font-size:12.5px;color:var(--txt-dim);margin-top:3px}
  .t-montant{font-family:'Archivo Black';font-size:22px;white-space:nowrap}
  .t-montant.due{color:var(--amende)} .t-montant.pend{color:var(--attente)} .t-montant.paid{color:var(--billet)}
  .t-actions{display:flex;gap:8px;margin-top:12px}

  .btn{border:0;border-radius:10px;cursor:pointer;font-family:'Archivo';font-weight:700;font-size:13.5px;padding:10px 16px;transition:.15s}
  .btn:active{transform:scale(.97)}
  .btn-pay{background:var(--bleu);color:#fff;flex:1}
  .btn-pay:hover{background:var(--bleu-fonce)}
  .btn-ok{background:var(--billet);color:#fff;flex:1}
  .btn-no{background:transparent;color:var(--amende);border:1.5px solid var(--amende)}
  .btn-ghost{background:var(--paper-dim);color:var(--txt)}
  .btn-full{width:100%}

  .stamp{position:absolute;right:10px;bottom:8px;font-family:'Archivo Black';font-size:15px;letter-spacing:.08em;padding:4px 12px;border:2.5px solid;border-radius:6px;transform:rotate(-8deg);opacity:.85;pointer-events:none;mix-blend-mode:multiply}
  .stamp.paid{color:var(--billet-dark);border-color:var(--billet-dark)}
  .stamp.pend{color:#a87a08;border-color:#a87a08;font-size:12px}

  .empty{text-align:center;color:var(--txt-dim);font-size:14px;padding:24px 10px;border:1.5px dashed var(--line);border-radius:var(--radius);background:rgba(255,255,255,.5)}
  .loading{text-align:center;color:var(--txt-dim);padding:40px 0;font-size:14px}

  .bareme-row{display:flex;align-items:center;gap:10px;background:var(--paper);color:var(--txt);border-radius:12px;padding:11px 13px;margin-bottom:8px;box-shadow:0 2px 8px rgba(4,95,159,.07)}
  .bareme-row .motif{flex:1;font-weight:600;font-size:14px}
  .bareme-row input[type=number]{width:64px;border:1.5px solid var(--line);border-radius:8px;font-family:'Archivo Black';font-size:15px;text-align:center;padding:6px 4px;color:var(--amende);background:#fff}
  .bareme-row .eur{font-family:'Archivo Black';color:var(--amende)}
  .bareme-row .del{border:0;background:none;color:var(--txt-dim);cursor:pointer;font-size:17px;padding:2px 6px}
  .bareme-row .del:hover{color:var(--amende)}

  .match{position:relative;background:var(--paper);color:var(--txt);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;box-shadow:0 2px 10px rgba(4,95,159,.09)}
  .m-head{padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:1.5px dashed var(--line)}
  .m-date{flex:none;text-align:center;background:var(--noir);color:#fff;border-radius:10px;padding:7px 10px;min-width:56px}
  .m-date b{font-family:'Archivo Black';font-size:19px;display:block;line-height:1}
  .m-date span{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:#9fb4c6}
  .m-info{flex:1}
  .m-adv{font-weight:700;font-size:15.5px}
  .m-detail{font-size:12.5px;color:var(--txt-dim);margin-top:3px;display:flex;align-items:center;gap:7px}
  .m-right{flex:none;display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .m-lieu{font-family:'Archivo Black';font-size:11px;letter-spacing:.06em;padding:4px 9px;border-radius:6px}
  .m-lieu.dom{background:var(--bleu-pale);color:var(--bleu-fonce)}
  .m-lieu.ext{background:var(--paper-dim);color:var(--txt-dim)}
  .m-del{border:0;background:none;color:var(--txt-dim);cursor:pointer;font-size:12px;font-family:'Archivo';font-weight:600;text-decoration:underline}
  .m-del:hover{color:var(--amende)}

  .duty{padding:12px 16px}
  .duty + .duty{border-top:1px solid var(--paper-dim)}
  .d-title{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .d-title .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .d-title b{font-size:13.5px}
  .d-title .count{margin-left:auto;font-size:11.5px;font-weight:700;padding:2px 9px;border-radius:999px}
  .count.full{background:#e3efe8;color:var(--billet-dark)}
  .count.miss{background:#fbe9e2;color:var(--amende)}
  .slots{display:flex;flex-direction:column;gap:6px}
  .slot{display:flex;align-items:center;gap:10px;background:var(--paper);border:1.5px solid var(--line);border-radius:10px;padding:8px 11px;font-size:13.5px}
  .slot.me{border-color:var(--bleu);background:var(--bleu-pale)}
  .slot.free{border-style:dashed;color:var(--txt-dim);background:transparent}
  .slot .avatar{width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black';font-size:11px;color:#fff}
  .slot .who{flex:1;font-weight:600}
  .slot .who small{display:block;font-weight:400;font-size:11px;color:var(--txt-dim)}
  .slot .mini{border:0;background:none;cursor:pointer;font-family:'Archivo';font-weight:700;font-size:12px;padding:5px 10px;border-radius:8px}
  .mini.join{background:var(--bleu);color:#fff}
  .mini.leave{color:var(--amende)}
  .mini.kick{color:var(--txt-dim)}

  .overlay{position:fixed;inset:0;background:rgba(9,34,54,.55);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .overlay.open{display:flex}
  .sheet{background:var(--paper);color:var(--txt);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:22px 20px 26px;animation:slideUp .25s ease-out;max-height:88vh;overflow-y:auto}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
  .sheet h3{font-family:'Archivo Black';font-size:19px;color:var(--bleu-fonce)}
  .sheet .sub{font-size:13px;color:var(--txt-dim);margin:4px 0 16px}
  .close-x{position:absolute;top:14px;right:16px;background:none;border:0;font-size:22px;color:var(--txt-dim);cursor:pointer}
  .sheet-inner{position:relative}

  .pay-opt{display:flex;align-items:center;gap:12px;width:100%;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:9px;cursor:pointer;text-align:left;font-family:'Archivo';transition:.15s}
  .pay-opt:hover{border-color:var(--bleu)}
  .pay-opt .ico{width:38px;height:38px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black';font-size:15px;color:#fff}
  .pay-opt .lbl b{display:block;font-size:14.5px}
  .pay-opt .lbl span{font-size:12px;color:var(--txt-dim)}
  .step2{display:none}
  .step2 .instr{background:#fff;border:1.5px dashed var(--line);border-radius:12px;padding:14px;font-size:14px;line-height:1.5;margin-bottom:14px}

  .field{margin-bottom:13px}
  .field label{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--txt-dim);margin-bottom:5px}
  .field input,.field select{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;font-family:'Archivo';font-size:15px;background:#fff;color:var(--txt)}
  .field input:focus,.field select:focus{outline:2px solid var(--bleu);outline-offset:1px}
  .field-row{display:flex;gap:10px}
  .field-row .field{flex:1}
  .seg{display:flex;gap:7px}
  .seg button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:10px 0;font-family:'Archivo';font-weight:700;font-size:13.5px;cursor:pointer;color:var(--txt-dim)}
  .seg button.on{border-color:var(--bleu);background:var(--bleu);color:#fff}

  .onboard{padding:10px 0 30px}
  .onboard h2{font-family:'Archivo Black';font-size:21px;text-align:center;margin-bottom:6px;color:var(--bleu-fonce)}
  .onboard p{text-align:center;color:var(--txt-dim);font-size:13.5px;margin-bottom:18px}
  .player-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .player-btn{display:flex;align-items:center;gap:10px;background:var(--paper);color:var(--txt);border:1.5px solid var(--line);border-radius:12px;padding:12px;font-family:'Archivo';font-weight:700;font-size:14.5px;cursor:pointer;transition:.15s;box-shadow:0 2px 8px rgba(4,95,159,.07)}
  .player-btn:hover{transform:translateY(-2px);border-color:var(--bleu)}
  .player-btn .avatar{width:30px;height:30px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black';font-size:12px;color:#fff}

  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(80px);background:var(--noir);color:#fff;font-weight:700;font-size:13.5px;padding:11px 20px;border-radius:999px;z-index:60;transition:transform .3s ease;box-shadow:0 6px 24px rgba(9,34,54,.35);max-width:90vw;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header class="wrap">

function avatarColor(name){
  if(!AVATAR_COLORS[name]){
    const p=["#3572d6","#c46a1f","#7a2ff2","#2f9e6b","#e4572e","#0f8a8a","#b3387a"];

function fmtDate(iso){const d=new Date(iso+"T00:00:00");return{jour:d.getDate(),mois:MOIS[d.getMonth()]}}
function fmtDM(iso){const d=new Date(iso);return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`}
function fmtDMH(iso){if(!iso)return "—";const d=new Date(iso);return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")} à ${String(d.getHours()).padStart(2,"0")}h${String(d.getMinutes()).padStart(2,"0")}`}
function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function seasonStart(){
  const d = new Date();
  const y = d.getMonth() >= 6 ? d.getFullYear() : d.getFullYear() - 1;
  return `${y}-07-01`;
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}

/* SOLDE d'un joueur = Σ amendes − Σ tables validées − Σ paiements validés */
function solde(id){
  const am = amendes.filter(a=>a.joueur_id===id).reduce((s,a)=>s+Number(a.montant),0);
  const cr = tablesMarque.filter(t=>t.joueur_id===id && t.statut==="valide").reduce((s,t)=>s+Number(t.montant),0);
  const pa = paiements.filter(p=>p.joueur_id===id && p.statut==="valide").reduce((s,p)=>s+Number(p.montant),0);
  return Math.round((am - cr - pa) * 100) / 100;
}

const nomDe = id => (joueursAll.find(j=>j.id===id)||{}).nom || "";

}

/* =====================================================================
   CHARGEMENT
===================================================================== */
async function loadAll(){
  const [eq, jo, ba, am, ma, ins, ap, pa, tm] = await Promise.all([
    db.from("equipes").select().order("nom"),
    db.from("joueurs").select("id,nom,role,actif").order("nom"),
    db.from("bareme").select().eq("actif",true).order("ordre"),
    db.from("amendes").select("*, joueurs!amendes_joueur_id_fkey(nom)").order("date_amende",{ascending:false}),
    db.from("matchs").select("*, equipes(nom,couleur), inscriptions(*, joueurs(nom))")
      .gte("date_match", todayISO())
      .order("date_match"),
    db.from("inscriptions").select("joueur_id, section, matchs(date_match)"),
    db.from("aperos").select("*, apero_inscriptions(*, joueurs(nom))").order("date_apero"),
    db.from("paiements").select("*, joueurs!paiements_joueur_id_fkey(nom)").order("declare_le",{ascending:false}),
    db.from("tables_marque").select("*, joueurs!tables_marque_joueur_id_fkey(nom)").order("declare_le",{ascending:false}),
  ]);
  const err = eq.error||jo.error||ba.error||am.error||ma.error||ins.error||ap.error||pa.error||tm.error;
  if(err){
    document.getElementById("app").innerHTML =
      `<div class="empty">⚠️ Connexion impossible.<br><small>${esc(err.message)}</small></div>`;
    return false;
  }
  equipes=eq.data; joueursAll=jo.data; joueurs=joueursAll.filter(j=>j.actif);
  bareme=ba.data; amendes=am.data; matchs=ma.data;
  allInscriptions=ins.data; aperosAll=ap.data;
  paiements=pa.data; tablesMarque=tm.data;

  if(AUTH && !joueurs.find(j=>j.id===AUTH.id)) logout(false);
  return true;
}

db.channel("caisse-noire")
  .on("postgres_changes", {event:"*", schema:"public"}, async ()=>{
    await loadAll(); render();
  })
  .subscribe();

      <p>Connexion avec ton code personnel à 4 chiffres.</p>
      <div class="player-grid">
        ${joueurs.map(j=>`
          <button class="player-btn" onclick="pickPlayer('${j.id}')">
            <span class="avatar" style="background:${avatarColor(j.nom)}">${esc(j.nom.slice(0,2).toUpperCase())}</span>
            ${esc(j.nom)}
          </button>`).join("")}
      </div>
      <button class="btn btn-ok btn-full" style="margin-top:16px"
              onclick="openRegisterForm()">➕ Je ne suis pas dans la liste</button>
    </div>`;
}
async function pickPlayer(id){
  pendingPlayer = joueurs.find(j=>j.id===id);
  const {data:hasPin, error} = await db.rpc("a_un_pin", {p_joueur:id});
  if(error){ toast("Erreur : "+error.message); return; }
  if(hasPin) openLoginSheet(); else openCreatePinSheet();
}
function pinField(id, label){
  return `<div class="field"><label>${label}</label>
    <input id="${id}" type="password" inputmode="numeric" pattern="[0-9]*"
           maxlength="4" placeholder="••••" autocomplete="off"
           style="text-align:center;font-size:22px;letter-spacing:8px"></div>`;
}
function openLoginSheet(){
  openSheet(`
    <h3>Salut ${esc(pendingPlayer.nom)} 👋</h3>
    <p class="sub">Entre ton code personnel.</p>
    ${pinField("fPin","Code à 4 chiffres")}
    <button class="btn btn-pay btn-full" onclick="doLogin()">Se connecter</button>`);
  setTimeout(()=>document.getElementById("fPin")?.focus(), 300);
}
async function doLogin(){
  const pin = (document.getElementById("fPin").value||"").trim();
  if(!/^\d{4}$/.test(pin)){ toast("4 chiffres !"); return; }
  const {data, error} = await db.rpc("login", {p_joueur:pendingPlayer.id, p_pin:pin});
  if(error){ toast(error.message.includes("incorrect") ? "Code incorrect ❌" : "Erreur : "+error.message); return; }
  setAuth(data);
}
function openCreatePinSheet(){
  openSheet(`
    <h3>Bienvenue ${esc(pendingPlayer.nom)} !</h3>
    <p class="sub">Première connexion : choisis ton code personnel à 4 chiffres.</p>
    ${pinField("fPin1","Ton code")}
    ${pinField("fPin2","Confirme ton code")}
    <button class="btn btn-ok btn-full" onclick="doCreatePin()">Créer mon code et me connecter</button>`);
  setTimeout(()=>document.getElementById("fPin1")?.focus(), 300);
}
async function doCreatePin(){
  const p1=(document.getElementById("fPin1").value||"").trim();
  const p2=(document.getElementById("fPin2").value||"").trim();
  if(!/^\d{4}$/.test(p1)){ toast("Le code doit faire 4 chiffres"); return; }
  if(p1!==p2){ toast("Les deux codes ne correspondent pas"); return; }
  const {data, error} = await db.rpc("definir_pin", {p_joueur:pendingPlayer.id, p_pin:p1});
  if(error){ toast("Erreur : "+error.message); return; }
  setAuth(data);
}
function openRegisterForm(){
  openSheet(`
    <h3>Bienvenue ! 🤾</h3>
    <p class="sub">Ton prénom apparaîtra dans la liste de l'équipe.</p>
    <div class="field"><label>Ton prénom</label>
      <input id="fNom" placeholder="Ex : Kévin" maxlength="30"></div>
    ${pinField("fPin1","Choisis ton code (4 chiffres)")}
    ${pinField("fPin2","Confirme ton code")}
    <button class="btn btn-ok btn-full" onclick="registerPlayer()">C'est parti !</button>`);
}
async function registerPlayer(){
  const nom=(document.getElementById("fNom").value||"").trim();
  const p1=(document.getElementById("fPin1").value||"").trim();
  const p2=(document.getElementById("fPin2").value||"").trim();
  if(nom.length<2){ toast("Prénom trop court !"); return; }
  if(!/^\d{4}$/.test(p1)){ toast("Le code doit faire 4 chiffres"); return; }
  if(p1!==p2){ toast("Les deux codes ne correspondent pas"); return; }
  const {data, error} = await db.rpc("register_joueur", {p_nom:nom, p_pin:p1});
  if(error){
    toast(error.code==="23505" || (error.message||"").includes("duplicate")
      ? "Ce prénom existe déjà — ajoute une initiale (ex : Kévin B.)"
      : "Erreur : "+error.message);
    return;
  }
  setAuth(data);
}
function setAuth(data){
  AUTH = data;
  localStorage.setItem("cn_auth", JSON.stringify(AUTH));
  closeModal();
  loadAll().then(render);
  toast(`Salut ${AUTH.nom} ! 👋`);
}
function logout(msg=true){
  AUTH = null; pendingPlayer = null;
  localStorage.removeItem("cn_auth");
  view = "amendes";
  render();
  if(msg===true) toast("À bientôt ! 👋");
}

/* =====================================================================
   💶 MON COMPTE — page d'accueil
===================================================================== */
function renderCompte(){
  let out = "";

  /* ---- blocs gestionnaire : à valider + retards ---- */
  if(isGest()){
    const pPend = paiements.filter(p=>p.statut==="pending");
    const tPend = tablesMarque.filter(t=>t.statut==="pending");
    out += `<div class="section-label">⏳ À valider (${pPend.length + tPend.length})
      <button class="add-mini" onclick="openAmendeForm()">+ Donner une amende</button></div>`;
    if(!pPend.length && !tPend.length) out += `<div class="empty">Rien à valider</div>`;
    out += pPend.map(p=>`
      <div class="ticket"><div class="t-head">
        <div><div class="t-motif">${esc(p.joueurs?.nom||"?")} — paiement du solde</div>
        <div class="t-meta">déclaré le ${fmtDMH(p.declare_le)} · via ${MOYENS[p.moyen]||"?"}</div></div>
        <div class="t-montant pend">${p.montant} €</div></div>
        ${p.joueur_id===AUTH.id
          ? `<div style="margin-top:10px;font-size:12.5px;color:var(--txt-dim);font-style:italic">🔒 Un autre gestionnaire doit valider ton propre paiement</div>`
          : `<div class="t-actions">
          <button class="btn btn-ok" onclick="validerPaiement('${p.id}')">✓ Argent reçu</button>
          <button class="btn btn-no" onclick="refuserPaiement('${p.id}')">Pas reçu</button>
        </div>`}</div>`).join("");
    out += tPend.map(t=>`
      <div class="ticket"><div class="t-head">
        <div><div class="t-motif">${esc(t.joueurs?.nom||"?")} — ${esc(t.motif||"Table de marque")}</div>
        <div class="t-meta">déclaré le ${fmtDMH(t.declare_le)} · crédit de ${t.montant} €</div></div>
        <div class="t-montant paid">−${t.montant} €</div></div>
        ${t.joueur_id===AUTH.id
          ? `<div style="margin-top:10px;font-size:12.5px;color:var(--txt-dim);font-style:italic">🔒 Un autre gestionnaire doit valider ton propre engagement</div>`
          : `<div class="t-actions">
          <button class="btn btn-ok" onclick="validerTable('${t.id}')">✓ Confirmer</button>
          <button class="btn btn-no" onclick="refuserTable('${t.id}')">Refuser</button>
        </div>`}</div>`).join("");

    /* retards : à partir du 11 du mois */
    const now = new Date();
    if(now.getDate() >= 11){
      const monthStart = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-01`;
      const retards = joueurs.map(j=>{
        const duAvant = amendes.filter(a=>a.joueur_id===j.id && a.date_amende < monthStart)
                          .reduce((s,a)=>s+Number(a.montant),0)
          - tablesMarque.filter(t=>t.joueur_id===j.id && t.statut==="valide").reduce((s,t)=>s+Number(t.montant),0)
          - paiements.filter(p=>p.joueur_id===j.id && p.statut==="valide").reduce((s,p)=>s+Number(p.montant),0);
        const deja = amendes.some(a=>a.joueur_id===j.id
          && a.motif==="Retard de paiement mensuel" && a.date_amende >= monthStart);
        return {j, du:Math.round(duAvant*100)/100, deja};
      }).filter(r=>r.du > 0);
      if(retards.length){
        out += `<div class="section-label">⏰ Retards de paiement (échéance du 10 dépassée)</div>` +
          retards.map(r=>`
            <div class="bareme-row">
              <div class="motif">${esc(r.j.nom)} <span style="color:var(--amende);font-family:'Archivo Black'">${r.du} €</span> <span style="color:var(--txt-dim);font-size:12px">dus des mois précédents</span></div>
              ${r.deja
                ? `<span style="font-size:12px;color:var(--txt-dim)">majoration appliquée ✓</span>`
                : `<button class="btn btn-no" style="padding:6px 10px;font-size:12px" onclick="appliquerMajoration('${r.j.id}','${esc(r.j.nom)}')">+2 € retard</button>`}
            </div>`).join("");
      }
    }
  }

  /* ---- mon solde ---- */
  const dNow = new Date();
  const jour = dNow.getDate(), mois = dNow.getMonth();
  const moisPrec = MOIS_LONG[(mois+11)%12];
  const moisCour = MOIS_LONG[mois];
  const moisSuiv = MOIS_LONG[(mois+1)%12];
  const cotisMontant = (bareme.find(b=>(b.motif||"").startsWith("Achat fûts"))||{}).montant ?? 3;
  const deadlineTxt = jour <= 10
    ? `📆 Le solde de <b>${moisPrec}</b> est à régler <b>avant le 10 ${moisCour}</b>. Passé ce délai : majoration de 2 €.`
    : `📆 Le solde de <b>${moisCour}</b> sera à régler <b>avant le 10 ${moisSuiv}</b>. Retard = majoration de 2 €.`;
  const s = solde(AUTH.id);
  const pend = paiements.find(p=>p.joueur_id===AUTH.id && p.statut==="pending");
  out += `
    <div class="section-label">Mon compte</div>
    <div class="ticket" style="text-align:center;padding:22px 16px 18px">
      <div style="font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--txt-dim)">${s<0?"Mon avoir":"Mon solde à payer"}</div>
      <div style="font-family:'Archivo Black';font-size:42px;line-height:1.1;color:${s>0?"var(--amende)":"var(--billet)"}">${s<0?Math.abs(s):s} €</div>
      ${s<0?`<div style="font-size:12.5px;color:var(--billet);font-weight:600;margin-top:2px">Grâce à ton engagement dans l'équipe, tes prochaines amendes seront déduites de cet avoir 😎</div>`:""}
      ${pend ? `<div style="font-size:13px;color:var(--attente);font-weight:700;margin-top:4px">⏳ Paiement de ${pend.montant} € en attente de validation</div>` : ""}
      <div style="display:flex;gap:8px;margin-top:14px;align-items:stretch">
        <button class="btn btn-pay" style="flex:1;height:auto" ${s>0 && !pend ? `onclick="openPayModal()"` : "disabled style='flex:1;height:auto;opacity:.45;cursor:default'"}>💳 Payer<br>mon solde</button>
        <div style="flex:1.6;display:flex;flex-direction:column;gap:6px">
          <button class="btn btn-ok" style="font-size:12px;padding:8px 8px" onclick="declarerEngagement('table')">☑️ J'ai fait une table de marque</button>
          <button class="btn btn-ok" style="font-size:12px;padding:8px 8px" onclick="declarerEngagement('apero')">☑️ J'ai organisé l'apéro d'un vendredi</button>
          <button class="btn btn-ok" style="font-size:12px;padding:8px 8px" onclick="declarerEngagement('casse_croute')">☑️ J'ai organisé un casse-croûte d'après match</button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--txt-dim);margin-top:12px">
        Tous les engagements auprès de l'équipe sont récompensés par un avoir de ${CREDIT_TABLE} € 💪
      </div>
    </div>
    <div class="empty" style="margin-bottom:12px">
      ${deadlineTxt}<br>
      🍺 Chaque 1er du mois : cotisation de ${cotisMontant} € obligatoire pour « Achat fûts de bière », ajoutée automatiquement au solde de chacun.
    </div>`;

  /* ---- mes engagements récompensés ---- */
  const mesCredits = tablesMarque.filter(t=>t.joueur_id===AUTH.id);
  const cValides = mesCredits.filter(t=>t.statut==="valide");
  const cAttente = mesCredits.filter(t=>t.statut==="pending");
  if(mesCredits.length){
    const nb = m => cValides.filter(t=>(t.motif||"Table de marque").startsWith(m)).length;
    const parts = [];
    if(nb("Table")) parts.push(`${nb("Table")} table${nb("Table")>1?"s":""} de marque`);
    if(nb("Casse")) parts.push(`${nb("Casse")} casse-croûte${nb("Casse")>1?"s":""}`);
    if(nb("Apéro")) parts.push(`${nb("Apéro")} apéro${nb("Apéro")>1?"s":""}`);
    const totC = cValides.reduce((s,t)=>s+Number(t.montant),0);
    out += `<div class="section-label">Mes engagements récompensés${cAttente.length?` (${cAttente.length} en attente)`:""}</div>
      <div class="ticket"><div class="t-head">
        <div><div class="t-motif">Crédit cumulé</div>
        <div class="t-meta">${parts.join(" · ")||"—"}</div></div>
        <div class="t-montant paid">−${totC} €</div></div></div>`;
  }

  /* ---- mes amendes ---- */
  const mine = amendes.filter(a=>a.joueur_id===AUTH.id);
  out += `<div class="section-label">Mes amendes (${mine.length})</div>` +
    (mine.length ? mine.map(a=>ligneAmende(a,false)).join("") : `<div class="empty">Aucune amende, t'es clean 🤝</div>`);

  /* ---- mes paiements ---- */
  const mesP = paiements.filter(p=>p.joueur_id===AUTH.id && p.statut==="valide");
  if(mesP.length){
    out += `<div class="section-label">Mes paiements</div>` +
      mesP.map(p=>`<div class="ticket"><div class="t-head">
        <div><div class="t-motif">Paiement du solde</div>
        <div class="t-meta">validé le ${p.valide_le?fmtDM(p.valide_le):"—"}${p.valide_par?` par ${esc(nomDe(p.valide_par))}`:""} · via ${MOYENS[p.moyen]||"?"}</div></div>
        <div class="t-montant paid">${p.montant} €</div></div>
        <div class="stamp paid">PAYÉ ✓</div></div>`).join("");
  }
  return out;
}

function ligneAmende(a, withNom){
  return `<div class="ticket"><div class="t-head">
    <div><div class="t-motif">${withNom?esc(a.joueurs?.nom||"?")+" — ":""}${esc(a.motif)}</div>
    <div class="t-meta">${fmtDM(a.date_amende)}</div></div>
    <div class="t-montant due">${a.montant} €</div></div></div>`;
}

function renderClassement(){
  const rows = joueurs.map(j=>({
    nom: j.nom,
    tot: paiements.filter(p=>p.joueur_id===j.id && p.statut==="valide")
                  .reduce((s,p)=>s+Number(p.montant),0)
  })).sort((a,b)=>b.tot-a.tot || a.nom.localeCompare(b.nom));
  if(!rows.length) return `<div class="empty">Aucun joueur</div>`;
  const medals = ["🥇","🥈","🥉"];

    <div class="ticket" style="padding-top:18px">
      ${rows.map((r,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:6px 0;${i?"border-top:1px solid var(--paper-dim)":""}">
          <span style="width:28px;text-align:center;${i<3?"font-size:18px":"font-family:'Archivo Black';font-size:13px;color:var(--txt-dim)"}">${i<3?medals[i]:i+1}</span>
          <span style="width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black';font-size:11px;color:#fff;background:${avatarColor(r.nom)}">${esc(r.nom.slice(0,2).toUpperCase())}</span>
          <b style="flex:1">${esc(r.nom)}</b>
          <span style="font-family:'Archivo Black';font-size:16px;color:${r.tot?"var(--billet)":"var(--txt-dim)"}">${r.tot} €</span>
        </div>`).join("")}
    </div>`;
}

    .sort((a,b)=>b.s-a.s || a.nom.localeCompare(b.nom));

  return `

    <div class="ticket" style="padding-top:18px">
      ${soldes.map((r,i)=>`

function ficheJoueur(id){
  if(!isGest()) return;
  const j = joueursAll.find(x=>x.id===id); if(!j) return;
  const mesA = amendes.filter(a=>a.joueur_id===id)
    .sort((x,y)=>(y.date_amende||"").localeCompare(x.date_amende||""));
  const mesT = tablesMarque.filter(t=>t.joueur_id===id)
    .sort((x,y)=>(y.declare_le||"").localeCompare(x.declare_le||""));
  const mesP = paiements.filter(p=>p.joueur_id===id)
    .sort((x,y)=>(y.declare_le||"").localeCompare(x.declare_le||""));
  const totAmendes = mesA.reduce((s,a)=>s+Number(a.montant),0);
  const totCredits = mesT.filter(t=>t.statut==="valide").reduce((s,t)=>s+Number(t.montant),0);
  const totPayes = mesP.filter(p=>p.statut==="valide").reduce((s,p)=>s+Number(p.montant),0);
  const s = solde(id);
  const ss = seasonStart();
  const nbTable = mesT.filter(t=>t.statut==="valide" && (t.motif||"Table de marque")==="Table de marque" && t.declare_le>=ss).length;
  const nbCC = allInscriptions.filter(i=>i.joueur_id===id && i.section==="casse_croute"
    && (i.matchs?.date_match||"") >= ss).length;
  const nbApero = aperosAll.filter(a=>a.date_apero>=ss &&
    (a.apero_inscriptions||[]).some(x=>x.joueur_id===id)).length;
  const chip = (n,lbl,color) => `<div style="flex:1;text-align:center;background:var(--bleu-pale);border-radius:10px;padding:8px 4px">
      <div style="font-family:'Archivo Black';font-size:17px;color:${color||"var(--bleu-fonce)"}">${n}</div>
      <div style="font-size:10.5px;color:var(--txt-dim)">${lbl}</div></div>`;
  const lA = a => `<div style="padding:8px 0;border-top:1px solid var(--paper-dim);font-size:13px">
      <div style="display:flex;justify-content:space-between;gap:8px"><b>${esc(a.motif)}</b>
        <span style="font-family:'Archivo Black';color:var(--amende);white-space:nowrap">${a.montant} €</span></div>
      <div style="color:var(--txt-dim);font-size:12px">reçue le ${fmtDMH(a.date_amende)}${a.donne_par?` · par ${esc(nomDe(a.donne_par))}`:""}</div></div>`;
  const lT = t => `<div style="padding:8px 0;border-top:1px solid var(--paper-dim);font-size:13px">
      <div style="display:flex;justify-content:space-between;gap:8px"><b>${esc(t.motif||"Table de marque")}</b>
        <span style="font-family:'Archivo Black';color:${t.statut==='valide'?'var(--billet)':'var(--attente)'};white-space:nowrap">−${t.montant} € ${t.statut==='valide'?'✓':'⏳'}</span></div>
      <div style="color:var(--txt-dim);font-size:12px">déclarée le ${fmtDMH(t.declare_le)}${t.valide_le?` · validé le ${fmtDMH(t.valide_le)}${t.valide_par?" par "+esc(nomDe(t.valide_par)):""}`:" · en attente"}</div></div>`;
  const lP = p => `<div style="padding:8px 0;border-top:1px solid var(--paper-dim);font-size:13px">
      <div style="display:flex;justify-content:space-between;gap:8px"><b>Paiement (${MOYENS[p.moyen]||"?"})</b>
        <span style="font-family:'Archivo Black';color:${p.statut==='valide'?'var(--billet)':'var(--attente)'};white-space:nowrap">${p.montant} € ${p.statut==='valide'?'✓':'⏳'}</span></div>
      <div style="color:var(--txt-dim);font-size:12px">déclaré le ${fmtDMH(p.declare_le)}${p.valide_le?` · <b>validé le ${fmtDMH(p.valide_le)}${p.valide_par?" par "+esc(nomDe(p.valide_par)):""}</b>`:" · en attente de validation"}</div></div>`;
  openSheet(`
    <h3>${esc(j.nom)}${j.actif?"":" <span style='color:var(--txt-dim);font-size:13px'>(retiré)</span>"}
      ${ROLES[j.role]?` <span class="gest-badge">${j.role==='super'?'SUPER':'GESTIONNAIRE'}</span>`:""}</h3>
    <p class="sub">Fiche complète · saison ${ss.slice(0,4)}-${(+ss.slice(0,4)+1).toString().slice(2)}</p>
    <div style="display:flex;gap:7px;margin-bottom:7px">
      ${chip(totAmendes+" €","amendes reçues","var(--amende)")}
      ${chip("−"+totCredits+" €","réduction tables","var(--billet)")}
    </div>
    <div style="display:flex;gap:7px;margin-bottom:6px">
      ${chip("−"+totPayes+" €","déjà payés","var(--billet)")}
      ${chip((s<0?Math.abs(s):s)+" €", s<0?"avoir":"solde actuel", s>0?"var(--amende)":"var(--billet)")}
    </div>
    <div style="text-align:center;font-size:11.5px;color:var(--txt-dim);margin-bottom:10px">
      ${totAmendes} € d'amendes − ${totCredits} € de tables − ${totPayes} € payés = <b>${s} €</b>
    </div>
    <div style="display:flex;gap:7px;margin-bottom:14px">
      ${chip(nbTable,"tables de marque","var(--bleu-fonce)")}
      ${chip(nbCC,"casse-croûtes")}
      ${chip(nbApero,"apéros gérés")}
    </div>
    <div class="section-label" style="margin:4px 0 2px">Amendes (${mesA.length}) · total ${totAmendes} €</div>
    ${mesA.length ? mesA.map(lA).join("") : '<div class="empty">Aucune amende</div>'}
    <div class="section-label" style="margin:14px 0 2px">Crédits d'engagement (${mesT.length}) · total −${totCredits} €</div>
    ${mesT.length ? mesT.map(lT).join("") : '<div class="empty">Aucune table déclarée</div>'}
    <div class="section-label" style="margin:14px 0 2px">Paiements (${mesP.length})</div>
    ${mesP.length ? mesP.map(lP).join("") : '<div class="empty">Aucun paiement</div>'}`);
}

function matchCard(m){
  const f = fmtDate(m.date_match);
  const del = isGest() ? `<button class="m-del" style="color:var(--bleu)" onclick="editMatch('${m.id}')">modifier</button>
    <button class="m-del" onclick="delMatch('${m.id}')">supprimer</button>` : "";
  return `<div class="match">
    <div class="m-head">
      <div class="m-date"><b>${f.jour}</b><span>${f.mois}</span></div>
      <div class="m-info">
        <div class="m-adv">${m.domicile?"vs":"@"} ${esc(m.adversaire)}</div>
        <div class="m-detail"><span class="team-tag" style="background:${m.equipes?.couleur||'#0480d8'}">${esc(m.equipes?.nom||"")}</span> ${(m.heure||"").slice(0,5).replace(":","h")}</div>
      </div>
      <div class="m-right">
        <div class="m-lieu ${m.domicile?"dom":"ext"}">${m.domicile?"DOMICILE":"EXTÉRIEUR"}</div>${del}
      </div>
    </div>
    ${m.domicile
      ? dutyBlock(m,"casse_croute",m.places_cc)
      : `<div class="duty" style="text-align:center;color:var(--txt-dim);font-size:13px">🚌 Match à l'extérieur — casse-croûte géré par le club recevant</div>`}
  </div>`;
}
function dutyBlock(m, section, places){
  const cfg = SECTIONS[section];
  const inscrits = m.inscriptions.filter(i=>i.section===section);
  const libres = places - inscrits.length;
  const full = libres<=0;
  let slots = inscrits.map(i=>{
    const nom = i.joueurs?.nom||"?";
    const isMe = i.joueur_id===AUTH.id;
    let action="";
    if(isMe) action=`<button class="mini leave" onclick="seDesinscrire('${m.id}','${section}')">Me désinscrire</button>`;
    else if(isGest()) action=`<button class="mini kick" onclick="retirer('${i.id}','${esc(nom)}')">Retirer ✕</button>`;
    return `<div class="slot ${isMe?"me":""}">
      <div class="avatar" style="background:${avatarColor(nom)}">${esc(nom.slice(0,2).toUpperCase())}</div>
      <div class="who">${esc(nom)}${isMe?" (toi)":""}</div>${action}</div>`;
  }).join("");
  const dejaInscrit = inscrits.some(i=>i.joueur_id===AUTH.id);
  for(let k=0;k<libres;k++){
    const join = (!dejaInscrit && k===0)
      ? `<button class="mini join" onclick="sInscrire('${m.id}','${section}')">Je m'inscris</button>` : "";
    slots += `<div class="slot free"><div class="avatar" style="background:#c9d5e0">?</div>
      <div class="who">Place libre</div>${join}</div>`;
  }
  return `<div class="duty">
    <div class="d-title"><span class="dot" style="background:${cfg.color}"></span>
      <b>${cfg.label}</b>
      <span class="count ${full?"full":"miss"}">${full?"Complet ✓":`Il manque ${libres}`}</span></div>
    <div class="slots">${slots}</div></div>`;
}
async function sInscrire(matchId, section){
  const {error} = await db.rpc("inscrire", {p_token:AUTH.token, p_match:matchId, p_section:section});
  if(error){
    if((error.message||"").includes("complet")){ toast("Trop tard, c'est complet !"); await loadAll(); render(); return; }
    if(rpcError(error)) return;
  }
  await loadAll(); render();
  toast(`Inscrit : ${SECTIONS[section].label} ✓`);
}
async function seDesinscrire(matchId, section){
  const {error} = await db.rpc("desinscrire", {p_token:AUTH.token, p_match:matchId, p_section:section});
  if(rpcError(error)) return;
  await loadAll(); render();
  toast("Désinscrit — la place est de nouveau libre");
}

/* =====================================================================
   🍻 APÉROS DU VENDREDI
===================================================================== */
function renderAperos(){
  const upcoming = aperosAll.filter(a=>a.date_apero >= todayISO());
  const addBtn = isGest() ? `<button class="add-mini" onclick="openAperoForm()">+ Ajouter un vendredi</button>` : "";
  return `
    <div class="section-label">🍻 Apéros du vendredi ${addBtn}</div>
    ${upcoming.length ? upcoming.map(aperoCard).join("") : `<div class="empty">Aucun apéro programmé${isGest()?" — ajoute les prochains vendredis !":""}</div>`}`;
}
function aperoCard(a){
  const f = fmtDate(a.date_apero);
  const inscrits = a.apero_inscriptions||[];
  const libres = a.places - inscrits.length;
  const full = libres<=0;
  const del = isGest() ? `<button class="m-del" onclick="delApero('${a.id}')">supprimer</button>` : "";
  let slots = inscrits.map(i=>{
    const nom = i.joueurs?.nom||"?";
    const isMe = i.joueur_id===AUTH.id;
    let action="";
    if(isMe) action=`<button class="mini leave" onclick="seDesinscrireApero('${a.id}')">Me désinscrire</button>`;
    else if(isGest()) action=`<button class="mini kick" onclick="retirerApero('${i.id}','${esc(nom)}')">Retirer ✕</button>`;
    return `<div class="slot ${isMe?"me":""}">
      <div class="avatar" style="background:${avatarColor(nom)}">${esc(nom.slice(0,2).toUpperCase())}</div>
      <div class="who">${esc(nom)}${isMe?" (toi)":""}</div>${action}</div>`;
  }).join("");
  const dejaInscrit = inscrits.some(i=>i.joueur_id===AUTH.id);
  for(let k=0;k<libres;k++){
    const join = (!dejaInscrit && k===0)
      ? `<button class="mini join" onclick="sInscrireApero('${a.id}')">Je m'inscris</button>` : "";
    slots += `<div class="slot free"><div class="avatar" style="background:#c9d5e0">?</div>
      <div class="who">Place libre</div>${join}</div>`;
  }
  return `<div class="match">
    <div class="m-head">
      <div class="m-date"><b>${f.jour}</b><span>${f.mois}</span></div>
      <div class="m-info">
        <div class="m-adv">Apéro après entraînement</div>
        <div class="m-detail">Vendredi soir · tout le club</div>
      </div>
      <div class="m-right"><div class="m-lieu dom">🍻 VENDREDI</div>${del}</div>
    </div>
    <div class="duty">
      <div class="d-title"><span class="dot" style="background:var(--bouffe)"></span>
        <b>Gestion de l'apéro</b>
        <span class="count ${full?"full":"miss"}">${full?"Complet ✓":`Il manque ${libres}`}</span></div>
      <div class="slots">${slots}</div>
    </div>
  </div>`;
}
async function sInscrireApero(id){
  const {error} = await db.rpc("inscrire_apero", {p_token:AUTH.token, p_apero:id});
  if(error){
    if((error.message||"").includes("complet")){ toast("Trop tard, c'est complet !"); await loadAll(); render(); return; }
    if(rpcError(error)) return;
  }
  await loadAll(); render();
  toast("Inscrit à l'apéro 🍻");
}
async function seDesinscrireApero(id){
  const {error} = await db.rpc("desinscrire_apero", {p_token:AUTH.token, p_apero:id});

/* ---------- notifications push ---------- */
let pushSub = null;
function urlB64ToU8(b64){
  const pad = "=".repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + pad).replace(/-/g, "+").replace(/_/g, "/"));
  return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));
}
async function initPush(){
  if(!("serviceWorker" in navigator) || !("PushManager" in window)) return;
  try{
    const reg = await navigator.serviceWorker.register("./sw.js");
    pushSub = await reg.pushManager.getSubscription();
    refreshPushBtn();
  }catch(e){}
}
function refreshPushBtn(){
  const b = document.getElementById("pushBtn");
  if(b) b.innerHTML = pushSub
    ? `<span>🔕 Désactiver les notifications</span>`
    : `<span>🔔 Activer les notifications</span>`;
}
async function togglePush(){
  if(!("serviceWorker" in navigator) || !("PushManager" in window)){
    toast("Notifications non supportées sur ce navigateur"); return;
  }
  try{
    if(pushSub){
      const ep = pushSub.endpoint;
      await pushSub.unsubscribe();
      pushSub = null;
      await db.rpc("desinscrire_push", {p_token:AUTH.token, p_endpoint:ep});
      refreshPushBtn();
      toast("Notifications désactivées 🔕");
      return;
    }
    const perm = await Notification.requestPermission();
    if(perm !== "granted"){ toast("Autorisation refusée dans le navigateur"); return; }
    const reg = await navigator.serviceWorker.ready;
    pushSub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToU8(VAPID_PUBLIC_KEY)
    });
    const j = pushSub.toJSON();
    const {error} = await db.rpc("inscrire_push", {
      p_token:AUTH.token, p_endpoint:j.endpoint,
      p_p256dh:j.keys.p256dh, p_auth:j.keys.auth
    });
    if(rpcError(error)){ await pushSub.unsubscribe(); pushSub=null; refreshPushBtn(); return; }
    refreshPushBtn();
    toast("Notifications activées 🔔");
  }catch(e){
    toast("Impossible d'activer : " + e.message);
  }
}

window.addEventListener("scroll", ()=>{
  document.getElementById("hambBtn")?.classList.toggle("floating", window.scrollY > 70);

let toastTimer;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2600);
}
